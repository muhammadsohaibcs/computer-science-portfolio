<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup page</title>
    <script src="https://kit.fontawesome.com/67c6f6f8c5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="Task2.css">
</head>

<body>
    <div class=" gray"> </div>
    <form>
        <div class="main">
            <div class="first">
                <h1 class="contact">Contact Now</h1>
                <input type="text" name="Username" id="Username" class="input" placeholder="Username">
                <input type="password" name="password" class="input" id="password" placeholder="Password">
                <input type="text" class="input" name="Department" id="Department" placeholder="Department">
                <input type="text" class="input" name="Message" id="Message" placeholder="Message">
                <button>Send Message</button>
            </div>
            <div class="Second" style="box-shadow: .5px .5px 5px 5px gray; padding: 30px;">
                <div class="icons">
                    <i class="fa-brands fa-square-facebook fa-2xl" style="color: #084e83;"></i>
                    <i class="fa-brands fa-square-twitter fa-2xl" style="color: #74C0FC;"></i>
                    <i class="fa-brands fa-square-google-plus fa-2xl"></i>
                </div>

                <div class="user">
                    <input type="text">
                    <i class="fa-solid fa-user fa-2xl"></i>
                </div>
                <div class="user">
                    <input type="text">
                    <i class="fa-solid fa-envelope fa-2xl"></i>
                </div>
                <select name="Departmet">
                    <option value="Department">Select a Department</option>
                </select>
                <textarea  rows="7" id=""></textarea>
            </div>
            

        </div>

    </form>

</body>

</html>
