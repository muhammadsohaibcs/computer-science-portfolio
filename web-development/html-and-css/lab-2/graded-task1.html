<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 1</title>
    <link rel="stylesheet" href="task1.css">
</head>
<body>
    <div class="container">
        <table class="login-box">
            <tr>
                <th colspan="2" class="grey">Member Login</th>
            </tr>
            <tr>
                
                <td colspan="2"><input type="text" placeholder="Enter username"></td>
            </tr>
            <tr>
                
                <td colspan="2"><input type="password" placeholder="Enter password"></td>
            </tr>
            <>
                <td class="forgot-pass"><a href="#">Forgot password?</a></td>
                <td colspan="2" class="login-button"><button type="submit">Login</button></td>
            </tr>
        </table>

        <table class="signup-box">
            <tr>
                <th colspan="2" class="grey">Sign Up. It's free.</th>
            </tr>
            <tr>
            
                <td><input type="text" placeholder="Enter username"></td>
                <td><input type="password" placeholder="Enter password"></td>
            </tr>
            <tr>

                <td><input type="email" placeholder="Enter email"></td>
                <td><input type="email" placeholder="Confirm email"></td>
            </tr>
            <tr>
                <th colspan="2" class="white">Personal Details</th>
            </tr>
            <tr>
                <td><input type="text" placeholder="First name"></td>
                <td><input type="text" placeholder="Last name"></td>
            </tr>
            <tr>
                <td><input type="email" placeholder="Enter email again"></td>
                <td><input type="email" placeholder="Confirm email"></td>
            </tr>
            <tr>
                <td><input type="text" placeholder="City"></td>
                <td><input type="text" placeholder="Province"></td>
            </tr>
            <tr>
                <td colspan="2"><input type="text" placeholder="Country"></td>
            </tr>
        </table>
        <button style="width: 100px;" type="submit">Sign Up</button>
    </div>
</body>

</html>
